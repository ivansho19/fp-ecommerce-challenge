<ng-container [ngSwitch]="variant">
  <ng-container *ngSwitchCase="'card'">
    @for (_ of items; track $index) {
      <div
        class="w-[280px] max-w-[280px] rounded-3xl border border-gray-200 bg-white p-4 shadow-sm"
      >
        <div class="aspect-[4/3] w-full rounded-md bg-gray-200 animate-pulse"></div>
        <div class="mt-3 space-y-2">
          <div class="h-4 w-2/3 rounded bg-gray-200 animate-pulse"></div>
          <div class="h-4 w-1/3 rounded bg-gray-200 animate-pulse"></div>
        </div>
      </div>
    }
  </ng-container>

  <ng-container *ngSwitchCase="'pdp'">
    <div class="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
      <div class="rounded-2xl bg-white p-6 shadow-sm">
        <div class="aspect-[4/3] w-full rounded-xl bg-slate-200 animate-pulse"></div>
      </div>
      <div class="rounded-2xl bg-white p-6 shadow-sm space-y-4">
        <div class="h-6 w-2/3 rounded bg-slate-200 animate-pulse"></div>
        <div class="h-4 w-1/2 rounded bg-slate-200 animate-pulse"></div>
        <div class="h-24 w-full rounded bg-slate-200 animate-pulse"></div>
      </div>
    </div>
  </ng-container>

  <ng-container *ngSwitchDefault>
    @for (_ of items; track $index) {
      <div
        class="w-[280px] max-w-[280px] rounded-3xl border border-gray-200 bg-white p-4 shadow-sm"
      >
        <div class="aspect-[4/3] w-full rounded-md bg-gray-200 animate-pulse"></div>
        <div class="mt-3 space-y-2">
          <div class="h-4 w-2/3 rounded bg-gray-200 animate-pulse"></div>
          <div class="h-4 w-1/3 rounded bg-gray-200 animate-pulse"></div>
        </div>
      </div>
    }
  </ng-container>
</ng-container>

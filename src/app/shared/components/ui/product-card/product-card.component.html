<div class="w-[280px] max-w-[280px] rounded-3xl border border-slate-100 bg-white p-4 shadow-sm">
  <div class="space-y-3">
    <a class="relative flex h-[190px] items-center justify-center rounded-2xl bg-slate-50 p-4" [routerLink]="href">
      <img class="mx-auto h-40 w-full object-contain" [src]="imageUrl" [alt]="imageAlt" loading="lazy" />
    </a>

    <div class="space-y-2">
      <p class="text-[10px] font-semibold uppercase text-slate-400">
        {{ subtitle }}
      </p>
      <a class="block text-sm font-semibold text-slate-900" [routerLink]="href">
        {{ name }}
      </a>
      <div class="inline-flex w-fit items-center gap-2 rounded-full bg-blue-50 px-2 py-1 text-[10px] text-blue-700">
        <span class="inline-flex h-3 w-3 items-center justify-center rounded-full bg-blue-600 text-white">i</span>
        Te puede interesar
      </div>
      <div class="flex items-center gap-2 text-[11px] text-slate-500">
        <span class="inline-flex h-4 w-4 items-center justify-center rounded-full bg-slate-200">
          <img class="h-5 w-5 object-contain" src="/assets/icons/icon_fp.png" alt="Inkafarma" loading="lazy" />
        </span>
        Inkafarma
      </div>
    </div>

    <div class="space-y-1 text-[12px] text-slate-500">
      <div class="flex items-center justify-between">
        <span>{{ price1 }}</span>
        <span class="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] text-slate-600">
          {{ discount }}
        </span>
      </div>
      <div class="flex items-center justify-between">
        <span>{{ price2 }}</span>
        <span class="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] text-slate-600">sp</span>
      </div>
      <div class="flex items-center justify-between font-semibold text-slate-700">
        <span>{{ price3 }}</span>
        <span class="rounded-full bg-blue-50 px-2 py-0.5 text-[10px] text-blue-600">
          {{ promo }}
        </span>
      </div>
    </div>

    <div class="flex items-center gap-3">
      @if (cartItem && quantity() > 0) {
      <app-cart-quantity-control class="flex-1" [quantity]="quantity()" (increment)="increment()"
        (decrement)="decrement()" (remove)="remove()" />
      } @else {
      <app-add-to-cart-button [label]="ctaLabel" [disabled]="!cartItem" [hostClass]="'flex-1'"
        [buttonClass]="'w-full h-12'" (action)="addToCart()" />
      }
      <app-heart-button sizeClass="h-10 w-10" ariaLabel="Favorito" />
    </div>
  </div>
</div>

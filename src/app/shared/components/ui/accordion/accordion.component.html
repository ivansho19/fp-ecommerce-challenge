<section class="rounded-2xl bg-white shadow-sm">
  <div class="flex items-center justify-between border-b px-6 py-4">
    <h2 class="text-sm font-semibold text-slate-900">{{ heading }}</h2>
  </div>
  <div class="divide-y">
    @for (item of items; track item.title) {
      <details
        class="group px-6 py-4"
        [open]="item === items[0]"
      >
        <summary class="flex cursor-pointer list-none items-center justify-between text-sm font-semibold text-slate-700">
          {{ item.title }}
          <span class="text-slate-400 transition group-open:rotate-180">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4">
              <path d="M6 9l6 6 6-6"></path>
            </svg>
          </span>
        </summary>
        <p class="mt-3 text-sm text-slate-600">
          {{ item.content }}
        </p>
      </details>
    }
  </div>
</section>
